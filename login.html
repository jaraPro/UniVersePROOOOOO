<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход</title>
  <meta http-equiv="refresh" content="0;url=/index2.html?auth=login">
  <script>
    window.location.replace('/index2.html?auth=login');
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="email"],
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="email"]:focus,
    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 30px 0;
      color: #999;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    .divider::before {
      margin-right: 10px;
    }

    .divider::after {
      margin-left: 10px;
    }

    #google-signin-button {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .google-btn-wrapper {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .footer a:hover {
      color: #764ba2;
    }

    .alert {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert-error {
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
      display: block;
    }

    .alert-success {
      background: #efe;
      color: #3c3;
      border: 1px solid #cfc;
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      font-size: 14px;
    }

    .spinner {
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Вход</h1>
    <p class="subtitle">Добро пожаловать обратно</p>

    <div id="alert" class="alert"></div>

    <div class="form-group">
      <label for="email">Email или номер карты</label>
      <input
        id="email"
        type="text"
        inputmode="email"
        placeholder="Введите email или номер карты"
        required
      >
    </div>

    <div class="form-group">
      <label for="password">Пароль</label>
      <input 
        id="password" 
        type="password" 
        placeholder="Введите пароль"
        required
      >
    </div>

    <button class="login-btn" onclick="handleEmailLogin()">
      Войти
    </button>

    <div class="form-group" style="margin-top: 20px;">
      <label for="phone">Телефон (войти по SMS)</label>
      <input id="phone" type="tel" placeholder="Введите телефон" />
    </div>
    <div class="form-group">
      <button class="register-btn" style="background: #1a73e8;" onclick="handleSendPhoneCode()">Отправить код</button>
    </div>
    <div class="form-group">
      <label for="phoneCode">Код из SMS</label>
      <input id="phoneCode" type="text" placeholder="Введите код" />
    </div>
    <div class="form-group">
      <button class="login-btn" style="background: #0f9d58;" onclick="handlePhoneCodeLogin()">Войти по коду</button>
    </div>

    <div class="divider">или</div>

    <div class="google-btn-wrapper">
      <div id="google-signin-button"></div>
    </div>

    <div class="loading" id="loading">
      <span class="spinner"></span>
      <span>Загрузка...</span>
    </div>

    <div class="footer">
      Нет аккаунта? <a href="register.html">Создать</a>
    </div>
  </div>

  <script>
    const API_URL = '/api/auth';
    const GOOGLE_CLIENT_ID = '983371437398-lcqaf62o1d096mrfauipfj5dqar5an0u.apps.googleusercontent.com';

    // Инициализируем Google Sign-In
    function initGoogleSignIn() {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleSignIn,
        ux_mode: 'popup'
      });

      google.accounts.id.renderButton(
        document.getElementById('google-signin-button'),
        {
          theme: 'outline',
          size: 'large',
          width: '100%',
          text: 'signin_with'
        }
      );
    }

    function handleGoogleSignIn(response) {
      const idToken = response.credential;
      showLoading(true);

      // Backend uses OAuth redirect flow, not direct Google ID token exchange.
      window.location.href = `${API_URL}/google`;
    }

    async function sha256Hex(input) {
      const data = new TextEncoder().encode(input);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash))
        .map((byte) => byte.toString(16).padStart(2, '0'))
        .join('');
    }

    async function buildCardAliasEmail(cardDigits) {
      const fingerprint = await sha256Hex(cardDigits);
      return `card-${fingerprint.slice(0, 24)}@payid.findu2.local`;
    }

    async function resolveLoginIdentifier(value) {
      const raw = (value || '').trim();
      if (!raw) {
        return '';
      }

      if (raw.includes('@')) {
        return raw.toLowerCase();
      }

      const cardDigits = raw.replace(/\D/g, '');
      if (cardDigits.length >= 12 && cardDigits.length <= 19) {
        return buildCardAliasEmail(cardDigits);
      }

      return raw.toLowerCase();
    }

    async function handleEmailLogin() {
      const identifier = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!identifier) {
        showAlert('Пожалуйста, введите email или номер карты', 'error');
        return;
      }

      if (!password) {
        showAlert('Пожалуйста, введите пароль', 'error');
        return;
      }

      showLoading(true);

      const email = await resolveLoginIdentifier(identifier);

      fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.accessToken) {
          localStorage.setItem('token', data.accessToken);
          localStorage.setItem('accessToken', data.accessToken);
          localStorage.setItem('universe_accessToken', data.accessToken);
          if (data.refreshToken) {
            localStorage.setItem('refreshToken', data.refreshToken);
          }
          localStorage.setItem('user', JSON.stringify(data.user));
          if (data.user) {
            const u = data.user;
            localStorage.setItem('universe_currentUser', JSON.stringify({
              id: u.id || u._id,
              name: [u.firstName, u.lastName].filter(Boolean).join(' ') || u.email,
              email: u.email,
              firstName: u.firstName,
              lastName: u.lastName,
            }));
          }
          showAlert('Успешно вошли в систему!', 'success');
          setTimeout(() => {
            window.location.href = 'profile.html';
          }, 1500);
        } else {
          showAlert(data.error || data.message || 'Ошибка входа', 'error');
        }
      })
      .catch(err => {
        console.error('Login error:', err);
        showAlert('Ошибка при входе', 'error');
      })
      .finally(() => showLoading(false));
    }

    async function handleSendPhoneCode() {
      const phone = document.getElementById('phone').value.trim();
      if (!phone) {
        showAlert('Введите телефон', 'error');
        return;
      }

      showLoading(true);
      try {
        const res = await fetch(`${API_URL}/resend-code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        const data = await res.json();

        if (res.ok) {
          showAlert('Код отправлен по SMS', 'success');
        } else {
          showAlert(data.error || data.message || 'Не удалось отправить код', 'error');
        }
      } catch (err) {
        console.error('SMS send error:', err);
        showAlert('Ошибка при отправке SMS', 'error');
      } finally {
        showLoading(false);
      }
    }

    async function handlePhoneCodeLogin() {
      const phone = document.getElementById('phone').value.trim();
      const code = document.getElementById('phoneCode').value.trim();

      if (!phone || !code) {
        showAlert('Укажите телефон и код', 'error');
        return;
      }

      showLoading(true);
      try {
        const res = await fetch(`${API_URL}/verify-code`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, code })
        });
        const data = await res.json();

        if (data.accessToken) {
          localStorage.setItem('token', data.accessToken);
          localStorage.setItem('accessToken', data.accessToken);
          localStorage.setItem('universe_accessToken', data.accessToken);
          if (data.refreshToken) {
            localStorage.setItem('refreshToken', data.refreshToken);
          }
          localStorage.setItem('user', JSON.stringify(data.user));
          showAlert('Успешный вход', 'success');
          setTimeout(() => { window.location.href = 'profile.html'; }, 1200);
        } else {
          showAlert(data.error || data.message || 'Ошибка входа по коду', 'error');
        }
      } catch (err) {
        console.error('Phone code login error:', err);
        showAlert('Ошибка при входе', 'error');
      } finally {
        showLoading(false);
      }
    }

    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `alert alert-${type}`;
      setTimeout(() => {
        alert.className = 'alert';
      }, 5000);
    }

    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
      const loginBtn = document.querySelector('.login-btn');
      if (loginBtn) {
        loginBtn.disabled = show;
      }
    }

    // Обработчик Enter для входа
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        handleEmailLogin();
      }
    });

    // Инициализируем при загрузке страницы
    window.addEventListener('load', () => {
      initGoogleSignIn();
    });
  </script>
  <script src="/shared-navbar.js"></script>
</body>
</html>
