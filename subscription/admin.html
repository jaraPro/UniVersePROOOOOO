<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ - Подписки и платежи</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f6ff;
      color: #1d2a4a;
    }

    .wrap {
      max-width: 1160px;
      margin: 20px auto;
      padding: 0 12px;
    }

    .hero {
      border-radius: 12px;
      background: linear-gradient(130deg, #073090, #1f57df);
      color: #fff;
      padding: 16px;
      margin-bottom: 12px;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .hero p {
      margin: 0;
      color: #dce6ff;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 700;
      background: #1447bd;
      color: #fff;
    }

    button.secondary {
      background: #e8efff;
      color: #1f438f;
      border: 1px solid #c8d7ff;
    }

    .status {
      margin-bottom: 12px;
      border-radius: 8px;
      padding: 10px;
      display: none;
      font-size: 14px;
    }

    .status.ok {
      display: block;
      border: 1px solid #9fd79f;
      background: #e9fbe9;
      color: #1f6722;
    }

    .status.warn {
      display: block;
      border: 1px solid #efcc84;
      background: #fff8e8;
      color: #795618;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .card {
      background: #fff;
      border: 1px solid #d4e0ff;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 6px 16px rgba(11, 29, 77, 0.08);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #123c97;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      border-bottom: 1px solid #ebf0ff;
      padding: 7px 6px;
      text-align: left;
      vertical-align: top;
      word-break: break-word;
    }

    th {
      color: #2f467f;
      background: #f5f8ff;
      position: sticky;
      top: 0;
    }

    .table-wrap {
      max-height: 65vh;
      overflow: auto;
      border: 1px solid #e6edff;
      border-radius: 8px;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Админ-панель подписок</h1>
      <p>Журнал оплат и активные подписки по университетам (доступно только admin email).</p>
    </section>

    <div class="controls">
      <button id="loadBtn">Обновить данные</button>
      <button class="secondary" id="toUniversitiesBtn">К университетам</button>
    </div>

    <div id="status" class="status"></div>

    <section class="grid">
      <article class="card">
        <h2>Журнал оплат</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Дата</th>
                <th>Email</th>
                <th>Университет</th>
                <th>Метод</th>
                <th>Visa</th>
                <th>Session</th>
              </tr>
            </thead>
            <tbody id="paymentsBody"></tbody>
          </table>
        </div>
      </article>

      <article class="card">
        <h2>Активные подписки</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Активирована</th>
                <th>Email</th>
                <th>Университет</th>
                <th>Метод</th>
                <th>Visa</th>
              </tr>
            </thead>
            <tbody id="subscriptionsBody"></tbody>
          </table>
        </div>
      </article>
    </section>
  </div>

  <script>
    function getAccessToken() {
      return localStorage.getItem('universe_accessToken') || localStorage.getItem('accessToken') || '';
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
    }

    function asDate(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString('ru-RU');
    }

    async function fetchJson(url) {
      const token = getAccessToken();
      if (!token) {
        throw new Error('not-authenticated');
      }

      const response = await fetch(url, {
        headers: {
          Authorization: `Bearer ${token}`,
        },
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || `HTTP ${response.status}`);
      }

      return response.json();
    }

    function renderPayments(items) {
      const body = document.getElementById('paymentsBody');
      if (!items || !items.length) {
        body.innerHTML = '<tr><td colspan="6">Платежей пока нет</td></tr>';
        return;
      }

      body.innerHTML = items.map((item) => {
        return `<tr>
          <td>${asDate(item.paidAt || item.grantedAt)}</td>
          <td>${item.email || '-'}</td>
          <td>${item.universityId || '-'}</td>
          <td>${item.paymentFlow || '-'}</td>
          <td>${item.visaType || '-'}</td>
          <td>${item.sessionId || '-'}</td>
        </tr>`;
      }).join('');
    }

    function renderSubscriptions(items) {
      const body = document.getElementById('subscriptionsBody');
      if (!items || !items.length) {
        body.innerHTML = '<tr><td colspan="5">Активных подписок нет</td></tr>';
        return;
      }

      body.innerHTML = items.map((item) => {
        return `<tr>
          <td>${asDate(item.grantedAt)}</td>
          <td>${item.email || '-'}</td>
          <td>${item.universityId || '-'}</td>
          <td>${item.paymentFlow || '-'}</td>
          <td>${item.visaType || '-'}</td>
        </tr>`;
      }).join('');
    }

    async function loadData() {
      try {
        const [payments, subscriptions] = await Promise.all([
          fetchJson('/api/admin/payments?limit=1000'),
          fetchJson('/api/admin/subscriptions'),
        ]);

        renderPayments(payments.items || []);
        renderSubscriptions(subscriptions.items || []);
        showStatus('Данные обновлены.', 'ok');
      } catch (error) {
        if (String(error.message).includes('not-authenticated')) {
          showStatus('Нужно войти как администратор. Перенаправление на login...', 'warn');
          setTimeout(() => {
            window.location.href = `/login.html?next=${encodeURIComponent('/subscription/admin.html')}`;
          }, 1000);
          return;
        }

        showStatus('Ошибка загрузки admin-данных. Проверьте admin email и токен.', 'warn');
      }
    }

    document.getElementById('loadBtn').addEventListener('click', loadData);
    document.getElementById('toUniversitiesBtn').addEventListener('click', () => {
      window.location.href = '/index5.html';
    });

    loadData();
  </script>
</body>
</html>
